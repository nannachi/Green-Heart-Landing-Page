<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../CSS/style.css">

  <title>Contact | GreenHeart</title>
</head>
<body>

  <header class="nav">
    <a href="../index.html" class="logo">GreenHeart</a>

    <nav>
      <a href="about.html">About</a>
      <a href="../PAGINE/Progetti.html">Projects</a>
      <a href="../PAGINE/Form.html">Contact</a>
    </nav>
  </header>

  <main class="contact-page">
    <section class="contact-hero">
      <div class="contact-layout">

        <div class="contact-copy">
          <span class="eyebrow">Get in touch</span>
          <h1>Costruiamo qualcosa che conta, insieme. </h1>
          <p>
            Che tu voglia collaborare, fare una domanda o semplicemente saperne di più, siamo qui per te
          </p>
        </div>

        <div class="contact-panel">
          <form class="contact-form">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" placeholder="Your name">
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="you@example.com">
            </div>

            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" name="message" rows="5" placeholder="Tell us a little more..."></textarea>
            </div>

            <button type="submit" class="btn">Contattaci</button>
          </form>
        </div>

      </div>
    </section>
  </main>

</body>
</html>
